<svg xmlns="http://www.w3.org/2000/svg" width="80" height="80" viewBox="0 0 80 80">
  <rect width="80" height="80" rx="18" fill="#0b0f19"/>
  <!-- Glowing aura behind the nodes -->
  <circle cx="40" cy="40" r="30" fill="url(#glow)" opacity="0.15" />
  <!-- Connecting lines -->
  <line x1="40" y1="25" x2="25" y2="55" stroke="url(#line-grad)" stroke-width="4.5" stroke-linecap="round"/>
  <line x1="40" y1="25" x2="55" y2="55" stroke="url(#line-grad)" stroke-width="4.5" stroke-linecap="round"/>
  <line x1="32.5" y1="40" x2="47.5" y2="40" stroke="url(#line-grad)" stroke-width="4.5" stroke-linecap="round"/>
  <!-- Nodes -->
  <circle cx="40" cy="25" r="6.5" fill="#818cf8" stroke="#0b0f19" stroke-width="1.5" />
  <circle cx="25" cy="55" r="6.5" fill="#6366f1" stroke="#0b0f19" stroke-width="1.5" />
  <circle cx="55" cy="55" r="6.5" fill="#4f46e5" stroke="#0b0f19" stroke-width="1.5" />
  <defs>
    <linearGradient id="line-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#a78bfa"/>
      <stop offset="100%" stop-color="#4f46e5"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#818cf8"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0"/>
    </radialGradient>
  </defs>
</svg>
